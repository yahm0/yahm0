name: Update Language Statistics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 0"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v5

      - name: Generate language stats
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          python3 <<'PY'
          import os
          import json
          import math
          import html
          import urllib.request
          import urllib.parse
          from pathlib import Path

          TOKEN = os.environ.get("STATS_TOKEN")
          if not TOKEN:
              raise SystemExit("STATS_TOKEN is missing")

          # Only include repos owned by these accounts.
          # This prevents unrelated org/collaborator repos from polluting your public profile stats.
          INCLUDED_OWNERS = {"yahm0", "Terminal-Software"}

          EXCLUDED_REPOS = {
              "yahm0/yahm0",
          }

          EXCLUDED_LANGUAGES = {
              "HTML",
              "CSS",
              "Markdown",
          }

          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "yahm0-profile-language-stats",
          }

          def github_get(url):
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req) as response:
                  data = response.read().decode("utf-8")
                  return json.loads(data), response.headers

          def list_repos():
              repos = []
              page = 1

              while True:
                  query = urllib.parse.urlencode({
                      "visibility": "all",
                      "affiliation": "owner,collaborator,organization_member",
                      "per_page": 100,
                      "page": page,
                      "sort": "full_name",
                  })

                  url = f"https://api.github.com/user/repos?{query}"
                  data, headers = github_get(url)

                  if not data:
                      break

                  repos.extend(data)
                  page += 1

              return repos

          def repo_languages(full_name):
              url = f"https://api.github.com/repos/{full_name}/languages"
              data, _ = github_get(url)
              return data

          repos = list_repos()

          filtered_repos = []
          for repo in repos:
              full_name = repo["full_name"]
              owner = repo["owner"]["login"]

              if owner not in INCLUDED_OWNERS:
                  continue

              if full_name in EXCLUDED_REPOS:
                  continue

              if repo.get("fork"):
                  continue

              if repo.get("archived"):
                  continue

              filtered_repos.append(repo)

          totals = {}
          repos_seen_by_language = {}

          for repo in filtered_repos:
              full_name = repo["full_name"]
              languages = repo_languages(full_name)

              for language, byte_count in languages.items():
                  if language in EXCLUDED_LANGUAGES:
                      continue

                  totals[language] = totals.get(language, 0) + byte_count
                  repos_seen_by_language.setdefault(language, set()).add(full_name)

          if not totals:
              raise SystemExit("No language data found")

          sorted_languages = sorted(totals.items(), key=lambda item: item[1], reverse=True)
          top_languages = sorted_languages[:12]
          max_bytes = top_languages[0][1]

          def human_bytes(n):
              for unit in ["B", "KB", "MB", "GB"]:
                  if n < 1024:
                      return f"{n:.1f} {unit}" if unit != "B" else f"{n} B"
                  n /= 1024
              return f"{n:.1f} TB"

          width = 900
          row_height = 42
          top_padding = 70
          bottom_padding = 45
          chart_left = 180
          chart_width = 560
          height = top_padding + len(top_languages) * row_height + bottom_padding

          rows = []
          for index, (language, byte_count) in enumerate(top_languages):
              y = top_padding + index * row_height
              bar_width = max(4, int((byte_count / max_bytes) * chart_width))
              percent = byte_count / sum(totals.values()) * 100
              repo_count = len(repos_seen_by_language.get(language, []))

              rows.append(f'''
              <text x="30" y="{y + 22}" class="label">{html.escape(language)}</text>
              <rect x="{chart_left}" y="{y}" width="{bar_width}" height="26" rx="5" class="bar"/>
              <text x="{chart_left + bar_width + 12}" y="{y + 19}" class="value">{percent:.1f}% · {human_bytes(byte_count)} · {repo_count} repos</text>
              ''')

          svg = f'''<svg width="{width}" height="{height}" viewBox="0 0 {width} {height}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub language statistics">
            <style>
              .bg {{ fill: #0d1117; }}
              .title {{ fill: #f0f6fc; font: 700 24px system-ui, -apple-system, Segoe UI, sans-serif; }}
              .subtitle {{ fill: #8b949e; font: 400 13px system-ui, -apple-system, Segoe UI, sans-serif; }}
              .label {{ fill: #c9d1d9; font: 600 14px system-ui, -apple-system, Segoe UI, sans-serif; }}
              .value {{ fill: #f0f6fc; font: 600 13px system-ui, -apple-system, Segoe UI, sans-serif; }}
              .bar {{ fill: #58a6ff; }}
              .meta {{ fill: #8b949e; font: 400 12px system-ui, -apple-system, Segoe UI, sans-serif; }}
            </style>
            <rect width="100%" height="100%" rx="12" class="bg"/>
            <text x="30" y="34" class="title">GitHub Language Stats</text>
            <text x="30" y="55" class="subtitle">Includes yahm0 and Terminal-Software repositories accessible to STATS_TOKEN</text>
            {''.join(rows)}
            <text x="30" y="{height - 18}" class="meta">Metric: GitHub Linguist byte totals by language, excluding HTML, CSS, and Markdown.</text>
          </svg>'''

          Path("stats").mkdir(exist_ok=True)
          Path("stats/languages.svg").write_text(svg, encoding="utf-8")

          print(f"Included repositories: {len(filtered_repos)}")
          for repo in filtered_repos:
              print(f"- {repo['full_name']}")

          print("Language totals:")
          for language, byte_count in sorted_languages:
              print(f"- {language}: {byte_count}")
          PY

      - name: Commit generated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add stats/languages.svg

          if git diff --cached --quiet; then
            echo "No language stat changes to commit."
          else
            git commit -m "Update language statistics"
            git push
          fi
